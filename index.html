<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Da Nang Moto Run</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a2a44; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        canvas { background: #000; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- НАСТРОЙКИ ЭКРАНА ---
canvas.width = 800;
canvas.height = 400;

// --- ЗАГРУЗКА КАРТИНОК ---
const backgroundImg = new Image();
backgroundImg.src = 'bg_dragon_bridge.png'; // Тот самый файл, который ты загрузила

// --- ПЕРЕМЕННЫЕ ИГРЫ ---
let score = 0;
let isGameOver = false;
let bgScroll = 0;
const bgSpeed = 3;

// Игрок (байк)
const bike = {
    x: 50,
    y: 300,
    width: 80,
    height: 50,
    dy: 0,
    jumpForce: 15,
    gravity: 0.8,
    isGrounded: false
};

// Препятствия
const obstacles = [];
let obstacleTimer = 1500;
let lastTime = 0;

// Управление
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        if (isGameOver) {
            location.reload();
        } else if (bike.isGrounded) {
            bike.dy = -bike.jumpForce;
            bike.isGrounded = false;
        }
    }
});

function spawnObstacle() {
    const types = ['люк', 'человек'];
    const type = types[Math.floor(Math.random() * types.length)];
    obstacles.push({
        x: canvas.width,
        y: 340,
        width: 40,
        height: 20,
        type: type,
        color: type === 'люк' ? '#444' : '#e0ac69'
    });
}

function update(time) {
    if (isGameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Движение и отрисовка фона (бесконечный цикл)
    bgScroll -= bgSpeed;
    if (backgroundImg.complete) {
        const tempScroll = Math.abs(bgScroll) % backgroundImg.width;
        ctx.drawImage(backgroundImg, -tempScroll, 0, backgroundImg.width, canvas.height);
        ctx.drawImage(backgroundImg, backgroundImg.width - tempScroll, 0, backgroundImg.width, canvas.height);
    }

    // 2. Гравитация игрока
    bike.dy += bike.gravity;
    bike.y += bike.dy;

    if (bike.y > 300) {
        bike.y = 300;
        bike.dy = 0;
        bike.isGrounded = true;
    }

    // 3. Отрисовка игрока (пока блоком, потом заменим на картинку байка)
    ctx.fillStyle = "blue";
    ctx.fillRect(bike.x, bike.y, bike.width, bike.height);
    ctx.fillStyle = "white";
    ctx.fillText("БАЙК", bike.x + 20, bike.y + 30);

    // 4. Препятствия
    if (time - lastTime > obstacleTimer) {
        spawnObstacle();
        lastTime = time;
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.x -= bgSpeed + 2;

        ctx.fillStyle = o.color;
        ctx.fillRect(o.x, o.y, o.width, o.height);

        // Проверка столкновения
        if (bike.x < o.x + o.width && bike.x + bike.width > o.x && bike.y < o.y + o.height && bike.y + bike.height > o.y) {
            isGameOver = true;
        }

        if (o.x < -o.width) {
            obstacles.splice(i, 1);
            score++;
        }
    }

    // 5. Интерфейс
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.textAlign = "left";
    ctx.fillText(`Очки: ${score}`, 20, 40);

    if (isGameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText("БАБАХ! Вы врезались!", canvas.width/2, canvas.height/2);
        ctx.fillText("Нажми ПРОБЕЛ, чтобы поехать снова", canvas.width/2, canvas.height/2 + 40);
    }

    requestAnimationFrame(update);
}

requestAnimationFrame(update);
</script>
</body>
</html>
